spring.datasource.url=jdbc:h2:mem:testmomentumdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

jwt.secret=TEST_SECRET_DONT_USE_IN_PROD
jwt.expirationTime=60000

# optionally override email/rabbit stuff to dummy values
spring.mail.username=fake@email.com
spring.mail.password=whatever

# Stop RabbitMQ config from being processed in test profile
spring.rabbitmq.host=localhost
spring.rabbitmq.port=12345
spring.rabbitmq.username=fake
spring.rabbitmq.password=fake
spring.rabbitmq.virtual-host=fake

logging.level.org.hibernate=OFF
logging.level.org.springframework.transaction=OFF