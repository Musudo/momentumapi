version: 2.1

executors:
  java-executor:
    docker:
      - image: circleci/python:3.8
      - image: circleci/openjdk:21-jdk
        environment:
          MYSQL_DATABASE: momentum_db
          MYSQL_USER: user
          MYSQL_PASSWORD: password
          MYSQL_ROOT_PASSWORD: rootpassword
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/momentum_db
          SPRING_DATASOURCE_USERNAME: user
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_MAIL_USERNAME: mail@example.com
          SPRING_MAIL_PASSWORD: password
          SPRING_MAIL_PORT: 587
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: rabbituser
          SPRING_RABBITMQ_PASSWORD: rabbitpass
          SPRING_RABBITMQ_PORT: 5672
          JWT_SECRET: jwtsecret
          JWT_EXPIRATION_TIME: 3600
    working_directory: ~/repo

jobs:
  build:
    executor: java-executor
    steps:
      - checkout

      # Docker setup
      - setup_remote_docker:
          version: 20.10.7
          docker_layer_caching: true
          service:
            - name: mysql:8.0
              alias: mysql

      # Install dependencies and build the application
      - run:
          name: Install Gradle
          command: |
            curl -s https://get.sdkman.io | bash
            source ~/.sdkman/bin/sdkman-init.sh
            sdk install gradle 8.5
      - run:
          name: Build app
          command: ./gradlew clean build -x test

      # Run tests
      - run:
          name: Run unit tests
          command: ./gradlew test

      # Build Docker image for the app
      - run:
          name: Build Docker image
          command: docker build -t momentumapi .

      # Push Docker image (Optional, uncomment if pushing to DockerHub or private registry)
      # - run:
      #     name: Push Docker image
      #     command: docker push momentumapi

  deploy:
    executor: java-executor
    steps:
      - checkout

      # Docker setup
      - setup_remote_docker:
          version: 20.10.7
          docker_layer_caching: true
          service:
            - name: mysql:8.0
              alias: mysql

      # Deploy application (customize with your deployment process)
      - run:
          name: Deploy to production
          command: |
            docker run -d --name momentumapi -p 8080:8080 momentumapi

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - deploy:
          requires:
            - build
          filters:
            branches:
              only:
                - main
