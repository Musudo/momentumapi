version: 2.1

executors:
  docker-executor:
    docker:
      - image: cimg/openjdk:21.0
      - image: mysql:8.0
        environment:
          MYSQL_DATABASE: momentum
          MYSQL_USER: musa
          MYSQL_PASSWORD: userpass
          MYSQL_ROOT_PASSWORD: rootpass
    working_directory: ~/project

jobs:
  build:
    executor: docker-executor
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/momentum
      SPRING_DATASOURCE_USERNAME: musa
      SPRING_DATASOURCE_PASSWORD: userpass
      JWT_SECRET: dummysecret
      JWT_EXPIRATION_TIME: 3600000
    steps:
      - checkout

      - restore_cache:
          keys:
            - gradle-cache-{{ checksum "build.gradle" }}
            - gradle-cache-

      - run:
          name: Download Dependencies
          command: ./gradlew dependencies --no-daemon

      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-cache-{{ checksum "build.gradle" }}

      - run:
          name: Wait for MySQL
          command: |
            for i in `seq 1 30`; do
              nc -z localhost 3306 && echo "MySQL is up" && exit 0
              echo "Waiting for MySQL..."
              sleep 2
            done
            echo "MySQL not reachable, failing."
            exit 1

      - run:
          name: Run Tests
          command: ./gradlew test --no-daemon

      - run:
          name: Build Jar
          command: ./gradlew bootJar --no-daemon

      - setup_remote_docker:
          docker_layer_caching: true

      - run:
          name: Build Docker Image
          command: |
            docker build -t momentumapi .

      - run:
          name: Save Docker Image (optional)
          command: |
            docker save momentumapi -o momentumapi.tar

workflows:
  version: 2
  build_and_test:
    jobs:
      - build
